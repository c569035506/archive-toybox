services:
  postgres:
    image: postgres:16-alpine
    container_name: archive-toybox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: archive_toybox
      POSTGRES_PASSWORD: archive_toybox
      POSTGRES_DB: archive_toybox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: archive-toybox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: archive_toybox
      POSTGRES_PASSWORD: archive_toybox
      POSTGRES_DB: archive_toybox
    ports:
      # 5433 避免与本机 Postgres（常占用 127.0.0.1:5432）冲突
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
